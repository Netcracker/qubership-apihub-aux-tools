name: Release apihub-api-diff

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version (e.g. v1.0.0)
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset-name: apihub-api-diff-linux-x64
            binary-path: dist/apihub-api-diff
          - os: windows-latest
            asset-name: apihub-api-diff-windows-x64.exe
            binary-path: dist/apihub-api-diff.exe
          - os: macos-latest
            asset-name: apihub-api-diff-macos-x64
            binary-path: dist/apihub-api-diff
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure npm auth
        shell: bash
        env:
          NPMRC: ${{ secrets.NPMRC }}
        run: |
          if [ -n "$NPMRC" ]; then
            printf '%s\n' "$NPMRC" > ~/.npmrc
          fi

      - run: npm install
        working-directory: apihub-api-diff

      - run: npm run typecheck
        working-directory: apihub-api-diff

      - run: npm test
        working-directory: apihub-api-diff

      - run: npm run build:binary
        working-directory: apihub-api-diff

      - name: Prepare release asset
        shell: bash
        run: |
          mkdir -p release-assets
          cp "${{ matrix.binary-path }}" "release-assets/${{ matrix.asset-name }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset-name }}
          path: release-assets/${{ matrix.asset-name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Normalize release version
        id: version
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          VERSION="${VERSION#v}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid semver: ${{ inputs.version }}" >&2
            exit 1
          fi
          echo "tag=apihub-api-diff/v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "name=v${VERSION}" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: apihub-api-diff ${{ steps.version.outputs.name }}
          generate_release_notes: true
          files: release-assets/*
