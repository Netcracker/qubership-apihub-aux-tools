openapi: 3.0.0
info:
  title: Pets API
  version: 2.0.0
paths:
  /pets:
    get:
      operationId: getPets
      parameters:
        - name: limit
          in: query
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - id
                  properties:
                    id:
                      type: string
